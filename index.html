<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyra Collective</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>
<body>

<div class="topbar">
15% FOR YOUR FIRST ORDER | COD AVAILABLE ✅ ALL OVER INDIA
</div>

<header>
<h2 class="logo">Zyra Collective</h2>
<i class="fas fa-bars menu" onclick="toggleMenu()"></i>
</header>

<!-- Sidebar -->
<div id="sidebar" class="sidebar">
<input type="text" id="searchInput" placeholder="Search..." onkeyup="searchProducts()">
<a onclick="goHome()">Home Collection</a>
<a onclick="openPrivacy()">Privacy Policy</a>
<a onclick="openReturn()">Return Policy</a>
<a onclick="openFAQ()">FAQs</a>
</div>

<!-- Hero Slider -->
<section class="hero">
<img src="images/hero1.png" class="slide active">
<img src="images/hero2.png" class="slide">
<img src="images/hero3.png" class="slide">
<video src="images/video.mp4" class="slide" muted autoplay loop></video>
</section>

<!-- Categories -->
<section id="categories" class="categories"></section>

<!-- Products -->
<section id="products" class="products"></section>

<!-- Checkout -->
<div id="checkout" class="modal">
<div class="modal-box">
<h3>Checkout</h3>
<input type="text" id="custName" placeholder="Full Name">
<input type="text" id="custAddress" placeholder="Address">

<select id="paymentMethod" onchange="paymentToggle()">
<option value="cod">Cash on Delivery</option>
<option value="upi">UPI</option>
</select>

<div id="qrBox" style="display:none;">
<img src="images/paymentqr.png" class="qr">
<input type="text" id="txnId" placeholder="Enter Transaction ID">
</div>

<button onclick="placeOrder()">Place Order</button>
</div>
</div>

<!-- Footer -->
<footer>
<div class="social">
<a href="https://instagram.com/um3rx70" target="_blank">
<i class="fab fa-instagram"></i>
</a>

<a href="https://wa.me/917385009275" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>
</div>
<p>© 2026 Zyra Collective. All Rights Reserved.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
