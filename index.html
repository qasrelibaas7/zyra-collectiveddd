<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyra Collective | Luxury Modest Wear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white overflow-x-hidden">

    <header class="fixed top-0 w-full z-50 glass-effect p-4 flex justify-between items-center border-b border-gold/20">
        <div id="menu-open" class="text-2xl text-gold cursor-pointer"><i class="fas fa-bars"></i></div>
        <img src="images/logo.png" alt="Zyra Logo" class="h-10 hover:scale-110 transition-transform">
        <div id="auth-trigger" class="text-gold cursor-pointer flex items-center gap-2">
            <span id="user-name" class="hidden text-xs">Guest</span>
            <i class="fas fa-user-circle text-2xl"></i>
        </div>
    </header>

    <div id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-black/95 border-r border-gold/20 z-[70] -translate-x-full transition-transform duration-500 p-6">
        <div class="flex justify-end mb-8"><i id="menu-close" class="fas fa-times text-2xl text-gold cursor-pointer"></i></div>
        <nav class="space-y-6 text-lg font-serif">
            <a href="#" class="block hover:text-gold transition" onclick="closeSidebar()">Home Collection</a>
            <a href="#" class="block hover:text-gold transition" onclick="showOrders()">My Orders</a>
            <a href="#" class="block hover:text-gold transition" onclick="openPolicy()">Return Policy</a>
            <a href="#" class="block hover:text-gold transition" onclick="openFAQs()">FAQs</a>
        </nav>
        <div class="mt-20 border-t border-gold/10 pt-6">
            <p class="text-xs text-gray-500 mb-4">CONNECT WITH US</p>
            <div class="flex gap-6 text-xl text-gold">
                <a href="https://instagram.com/um3rx70"><i class="fab fa-instagram"></i></a>
                <a href="https://wa.me/917385009275"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </div>

    <section class="relative h-screen w-full overflow-hidden">
        <div id="hero-slider" class="h-full w-full relative">
            <div class="slide active absolute inset-0 transition-opacity duration-1000">
                <img src="images/hero1.png" class="object-cover w-full h-full brightness-50">
            </div>
            <div class="slide absolute inset-0 opacity-0 transition-opacity duration-1000">
                <img src="images/hero2.png" class="object-cover w-full h-full brightness-50">
            </div>
            <div class="slide absolute inset-0 opacity-0 transition-opacity duration-1000">
                <img src="images/hero3.png" class="object-cover w-full h-full brightness-50">
            </div>
            <div class="slide absolute inset-0 opacity-0 transition-opacity duration-1000">
                <video src="images/video.mp4" autoplay muted loop class="object-cover w-full h-full brightness-50"></video>
            </div>
        </div>
        <div class="absolute inset-0 flex flex-col justify-center items-center text-center p-6 z-10">
            <h1 class="text-5xl md:text-7xl font-serif text-gold-glow mb-4 slide-up">ZYRA COLLECTIVE</h1>
            <p class="text-gray-300 tracking-[0.3em] uppercase text-sm slide-up-delay">The Pinnacle of Modest Luxury</p>
            <button class="mt-8 px-10 py-3 border border-gold text-gold hover:bg-gold hover:text-black transition-all duration-500 uppercase tracking-widest text-xs">Explore Shop</button>
        </div>
    </section>

    <main id="main-view" class="p-6 pb-32 max-w-7xl mx-auto">
        </main>

    <nav class="fixed bottom-0 w-full glass-effect border-t border-gold/20 p-4 flex justify-around items-center z-50">
        <button onclick="window.scrollTo(0,0)" class="nav-btn active text-gold"><i class="fas fa-home"></i><span class="block text-[10px]">Home</span></button>
        <button onclick="showOrders()" class="nav-btn text-gray-400"><i class="fas fa-shopping-bag"></i><span class="block text-[10px]">Orders</span></button>
        <button onclick="toggleAuth()" class="nav-btn text-gray-400"><i class="fas fa-user"></i><span class="block text-[10px]">Profile</span></button>
    </nav>

    <div id="order-modal" class="fixed inset-0 z-[80] hidden bg-black/95 backdrop-blur-xl p-6 overflow-y-auto">
        <div class="max-w-2xl mx-auto mt-10">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-serif text-gold">Your Journey</h2>
                <i onclick="closeModal('order-modal')" class="fas fa-times text-xl cursor-pointer"></i>
            </div>
            <div id="orders-container" class="space-y-4">
                </div>
        </div>
    </div>

    <div id="faq-modal" class="fixed inset-0 z-[80] hidden bg-black/95 backdrop-blur-xl p-6 overflow-y-auto">
        <div class="max-w-2xl mx-auto mt-10">
            <h2 class="text-3xl font-serif text-gold mb-8 text-center">Frequently Asked</h2>
            <div class="space-y-4" id="faq-accordion">
                <div class="border border-gold/20 rounded-xl overflow-hidden">
                    <button class="w-full p-4 text-left flex justify-between bg-white/5 font-semibold" onclick="toggleFaq(this)">
                        Are the Attars alcohol-free? <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="hidden p-4 text-gray-400 border-t border-gold/10">Yes, all our Attars are 100% pure oil-based and alcohol-free for a long-lasting luxury scent.</div>
                </div>
            </div>
            <button onclick="closeModal('faq-modal')" class="mt-8 text-gold w-full text-center underline">Close</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
