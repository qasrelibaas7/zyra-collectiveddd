<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyra Collective | Luxury Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white overflow-x-hidden">

    <header class="fixed top-0 w-full z-[2000] bg-white/70 backdrop-blur-xl border-b border-gold/10 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-4">
            <div onclick="toggleMenu(true)" class="cursor-pointer group">
                <div class="w-6 h-0.5 bg-black mb-1.5 group-hover:bg-gold transition"></div>
                <div class="w-4 h-0.5 bg-black group-hover:bg-gold transition"></div>
            </div>
            <img src="images/logo.png" class="h-6" onerror="this.src='https://via.placeholder.com/80x30?text=ZYRA'">
        </div>
        <div class="flex items-center space-x-6">
            <i class="fas fa-search text-sm opacity-40"></i>
            <div id="top-user-icon" onclick="showPage('profile-page')" class="w-8 h-8 rounded-full border border-gold/30 overflow-hidden flex items-center justify-center">
                <i class="far fa-user text-xs"></i>
            </div>
        </div>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-80 bg-white z-[3000] -translate-x-full transition-all duration-700 ease-[cubic-bezier(0.9,0,0.1,1)] p-8 shadow-2xl">
        <div class="flex justify-between items-center mb-16">
            <h2 class="hero-title text-gold text-2xl italic uppercase tracking-tighter">Zyra Collective</h2>
            <i onclick="toggleMenu(false)" class="fas fa-times text-xl opacity-20 cursor-pointer"></i>
        </div>
        <nav class="space-y-8">
            <div onclick="showPage('home-page')" class="menu-link">Home Collection</div>
            <div onclick="showPage('orders-page')" class="menu-link">My Order History</div>
            <div onclick="showPolicy('Return')" class="menu-link">Return Policy</div>
            <div onclick="showPolicy('FAQ')" class="menu-link">FAQs & Support</div>
        </nav>
        <div class="absolute bottom-12 flex space-x-8 text-2xl text-gold/40">
            <a href="https://www.instagram.com/um3rx70" class="hover:text-gold"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/917385009275" class="hover:text-gold"><i class="fab fa-whatsapp"></i></a>
        </div>
    </aside>
    <div id="overlay" onclick="toggleMenu(false)" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-[2500] hidden opacity-0 transition-opacity"></div>

    <main id="app" class="mt-24 pb-28">
        <section id="home-page" class="page-view p-4">
            <div class="relative h-64 rounded-[45px] overflow-hidden shadow-2xl mb-12 transform-gpu">
                <div id="slider-track" class="flex transition-transform duration-1000 ease-[cubic-bezier(0.23,1,0.32,1)] h-full" style="width: 400%;">
                    <img src="images/hero1.png" class="w-1/4 h-full object-cover">
                    <div class="w-1/4 h-full">
                        <video id="h-vid" class="w-full h-full object-cover" muted loop playsinline>
                            <source src="images/video.mp4" type="video/mp4">
                        </video>
                    </div>
                    <img src="images/hero2.png" class="w-1/4 h-full object-cover">
                    <img src="images/hero3.png" class="w-1/4 h-full object-cover">
                </div>
            </div>

            <div id="cat-container" class="space-y-6"></div>
        </section>

        <section id="list-page" class="page-view hidden p-5">
            <div class="flex items-center space-x-4 mb-10" onclick="showPage('home-page')">
                <i class="fas fa-chevron-left text-gold"></i>
                <h2 id="cat-title-display" class="hero-title text-2xl uppercase italic"></h2>
            </div>
            <div id="product-grid" class="grid gap-12"></div>
        </section>

        <section id="profile-page" class="page-view hidden p-8">
            <div id="login-ui" class="space-y-6 text-center">
                <h2 class="hero-title text-3xl mb-10">Sign In</h2>
                <button onclick="login('google')" class="auth-btn bg-white border"><i class="fab fa-google text-red-500 mr-3"></i> Google Account</button>
                <button onclick="login('fb')" class="auth-btn bg-[#1877f2] text-white"><i class="fab fa-facebook-f mr-3"></i> Facebook Account</button>
                <div class="py-4 opacity-20 text-[10px] tracking-[4px]">OR MOBILE / EMAIL</div>
                <input type="text" id="phone-email" placeholder="Phone or Email" class="w-full p-5 bg-gray-50 rounded-3xl border outline-none">
                <button class="w-full py-5 bg-black text-white rounded-3xl font-bold uppercase tracking-[3px] text-[10px]">Continue</button>
            </div>
            <div id="dash-ui" class="hidden text-center">
                <div class="bg-gray-50 p-12 rounded-[50px] border border-gold/10">
                    <img id="u-pic" class="w-24 h-24 rounded-full mx-auto border-4 border-white shadow-xl mb-4">
                    <h3 id="u-name" class="hero-title text-xl"></h3>
                    <p id="u-mail" class="text-[10px] opacity-40 uppercase mt-1"></p>
                </div>
                <button onclick="firebase.auth().signOut()" class="mt-10 text-red-400 text-[10px] font-bold uppercase tracking-widest underline">Sign Out</button>
            </div>
        </section>

        <section id="policy-page" class="page-view hidden p-8">
            <h2 id="pol-head" class="hero-title text-3xl mb-6"></h2>
            <div id="pol-content" class="text-xs leading-relaxed opacity-60 bg-gray-50 p-6 rounded-3xl"></div>
            <button onclick="showPage('home-page')" class="mt-10 w-full py-5 border border-black rounded-3xl text-[10px] font-bold uppercase tracking-widest">Close</button>
        </section>
    </main>

    <nav class="fixed bottom-0 w-full h-24 bg-white/80 backdrop-blur-2xl border-t border-gold/10 flex justify-around items-center z-[2000] px-10">
        <div onclick="showPage('home-page')" class="nav-icon active"><i class="fas fa-home"></i></div>
        <div onclick="showPage('orders-page')" class="nav-icon"><i class="fas fa-shopping-bag"></i></div>
        <div onclick="showPage('profile-page')" class="nav-icon"><i class="fas fa-user-circle"></i></div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
