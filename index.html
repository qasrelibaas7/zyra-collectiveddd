<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyra Collective | Luxury Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="pb-24">

<nav class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-[1000]">
    <div class="flex items-center space-x-4">
        <i onclick="toggleSidebar(true)" class="fas fa-bars text-xl cursor-pointer"></i>
        <h1 class="text-xl hero-title font-bold text-gold uppercase tracking-tighter">Zyra</h1>
    </div>
    <div id="top-auth" onclick="showSection('profile-page')">
        <button class="text-[10px] font-bold border-b-2 border-gold uppercase">Login</button>
    </div>
</nav>

<div id="sidebar" class="sidebar p-6 shadow-2xl">
    <div class="flex justify-between items-center mb-10 border-b pb-4">
        <h2 class="hero-title text-gold text-xl">Zyra Menu</h2>
        <i onclick="toggleSidebar(false)" class="fas fa-times text-xl cursor-pointer"></i>
    </div>
    <div class="space-y-6 text-xs font-bold uppercase tracking-widest">
        <p onclick="showSection('home-page')" class="cursor-pointer hover:text-gold transition">Home Collection</p>
        <p onclick="showSection('orders-page')" class="cursor-pointer hover:text-gold transition">My Orders</p>
        <div class="pt-10 flex space-x-6 text-2xl text-gold">
            <a href="https://www.instagram.com/um3rx70" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/917385009275" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>
</div>
<div id="overlay" class="overlay" onclick="toggleSidebar(false)"></div>

<main id="main-content">
    <div id="home-page" class="app-section p-4">
        <div class="relative h-56 bg-gray-100 rounded-[40px] overflow-hidden mb-8 shadow-lg">
            <div id="slider-container" class="flex transition-transform duration-700 ease-in-out h-full" style="width: 400%;">
                <img src="images/hero1.png" class="w-1/4 h-full object-cover" onerror="this.src='https://via.placeholder.com/800x400?text=Premium+Collection'">
                <div class="w-1/4 h-full">
                    <video id="hero-video" class="w-full h-full object-cover" autoplay muted loop playsinline>
                        <source src="images/hero_video.mp4" type="video/mp4">
                    </video>
                </div>
                <img src="images/hero2.png" class="w-1/4 h-full object-cover" onerror="this.src='https://via.placeholder.com/800x400?text=New+Arrivals'">
                <img src="images/hero3.png" class="w-1/4 h-full object-cover" onerror="this.src='https://via.placeholder.com/800x400?text=Luxury+Wear'">
            </div>
        </div>

        <div id="category-grid" class="grid grid-cols-2 gap-4"></div>

        <footer class="mt-16 p-10 bg-white border-t text-center space-y-6">
            <h2 class="hero-title text-gold text-2xl uppercase tracking-tighter">Zyra Collective</h2>
            <div class="flex justify-center space-x-8 text-xl text-gray-400">
                <a href="https://www.instagram.com/um3rx70" target="_blank"><i class="fab fa-instagram hover:text-[#E1306C] transition-colors"></i></a>
                <a href="https://wa.me/917385009275" target="_blank"><i class="fab fa-whatsapp hover:text-[#25D366] transition-colors"></i></a>
            </div>
            <div class="text-[9px] uppercase tracking-[3px] opacity-40 leading-relaxed">
                <p>Premium Modest Wear Boutique</p>
                <p>© 2026 All Rights Reserved</p>
            </div>
        </footer>
    </div>

    <div id="product-view" class="app-section hidden p-5">
        <div class="flex items-center space-x-4 mb-6" onclick="showSection('home-page')">
            <i class="fas fa-arrow-left cursor-pointer"></i> <h2 id="cat-title" class="hero-title text-xl uppercase"></h2>
        </div>
        <div id="prod-list" class="grid gap-8"></div>
    </div>

    <div id="checkout-page" class="app-section hidden p-6">
        <h2 class="hero-title text-2xl mb-6">Order Details</h2>
        <div id="item-summary" class="bg-gray-50 p-6 rounded-3xl mb-6 border border-gold/10"></div>
        <form id="order-form" class="space-y-4">
            <input type="text" id="cust-name" placeholder="Full Name" class="w-full p-4 border rounded-2xl" required>
            <input type="tel" id="cust-phone" placeholder="WhatsApp Number" class="w-full p-4 border rounded-2xl" required>
            <textarea id="cust-address" placeholder="Full Address" class="w-full p-4 border rounded-2xl h-24" required></textarea>
            <button type="submit" id="order-btn" class="w-full py-5 bg-black text-white rounded-2xl font-bold uppercase tracking-[3px]">Place Order</button>
        </form>
    </div>

    <div id="profile-page" class="app-section hidden p-5 text-center">
        <div id="user-info" class="bg-gray-50 p-10 rounded-[40px] border mb-6">
            <img id="u-img" src="https://via.placeholder.com/100" class="w-20 h-20 rounded-full mx-auto border-4 border-white shadow-xl mb-4">
            <h3 id="u-name" class="font-bold text-xl uppercase">Guest User</h3>
            <p id="u-email" class="text-[10px] opacity-50"></p>
        </div>
        <button id="auth-btn" onclick="handleAuth()" class="w-full py-5 bg-black text-white rounded-2xl font-bold uppercase tracking-[2px]">Login with Google</button>
    </div>
</main>

<div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around items-center z-[2000] shadow-xl">
    <div onclick="showSection('home-page')" class="text-center cursor-pointer text-gold"><i class="fas fa-home text-xl"></i></div>
    <div onclick="showSection('orders-page')" class="text-center cursor-pointer text-gray-400"><i class="fas fa-shopping-bag text-xl"></i></div>
    <div onclick="showSection('profile-page')" class="text-center cursor-pointer text-gray-400"><i class="fas fa-user-circle text-xl"></i></div>
</div>

<script src="script.js"></script>
</body>
</html>
