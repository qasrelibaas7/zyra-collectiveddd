<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyra Collective | Luxury Redefined</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white">

    <header class="fixed top-0 w-full z-[1000] bg-white/80 backdrop-blur-md border-b px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <i onclick="toggleMenu(true)" class="fas fa-bars-staggered text-xl text-gold cursor-pointer"></i>
            <img src="images/logo.png" alt="Zyra" class="h-8" onerror="this.src='https://via.placeholder.com/100x40?text=ZYRA'">
        </div>
        <div class="relative flex-1 mx-4 max-w-md">
            <input type="text" id="mainSearch" placeholder="Search luxury..." class="w-full bg-gray-100 rounded-full py-2 px-10 text-xs focus:ring-1 focus:ring-gold outline-none">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-[10px]"></i>
        </div>
        <div id="userTrigger" onclick="showPage('profile-page')" class="cursor-pointer">
            <i class="far fa-user-circle text-xl text-gray-700"></i>
        </div>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-white z-[2000] -translate-x-full transition-transform duration-500 p-6 shadow-2xl">
        <div class="flex justify-between items-center mb-10">
            <h2 class="hero-title text-gold text-2xl uppercase italic">Zyra</h2>
            <i onclick="toggleMenu(false)" class="fas fa-times text-xl opacity-30 cursor-pointer"></i>
        </div>
        <nav class="space-y-6 text-[11px] font-bold uppercase tracking-[3px]">
            <p onclick="showPage('home-page')" class="hover:text-gold cursor-pointer transition">Collections</p>
            <p onclick="showPage('orders-page')" class="hover:text-gold cursor-pointer transition">Order History</p>
            <p onclick="showPage('policy-page')" class="hover:text-gold cursor-pointer transition">Returns & Policy</p>
            <p onclick="showPage('faq-page')" class="hover:text-gold cursor-pointer transition">FAQs</p>
        </nav>
        <div class="absolute bottom-10 left-6 right-6 flex justify-around text-xl text-gold border-t pt-6">
            <a href="https://www.instagram.com/um3rx70"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/917385009275"><i class="fab fa-whatsapp"></i></a>
        </div>
    </aside>
    <div id="overlay" onclick="toggleMenu(false)" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[1500] hidden"></div>

    <main id="app-container" class="mt-20 pb-24">
        
        <section id="home-page" class="page-view animate-fade-in p-4">
            <div class="hero-slider relative h-64 rounded-[40px] overflow-hidden shadow-2xl mb-10">
                <div id="slider-track" class="flex transition-transform duration-1000 ease-out h-full" style="width: 400%;">
                    <img src="images/hero1.png" class="w-1/4 object-cover" onerror="this.src='https://via.placeholder.com/800x400?text=Premium+Collection'">
                    <div class="w-1/4 h-full relative">
                        <video id="heroVid" class="w-full h-full object-cover" muted playsinline loop>
                            <source src="images/video.mp4" type="video/mp4">
                        </video>
                    </div>
                    <img src="images/hero2.png" class="w-1/4 object-cover" onerror="this.src='https://via.placeholder.com/800x400?text=New+Arrivals'">
                    <img src="images/hero3.png" class="w-1/4 object-cover" onerror="this.src='https://via.placeholder.com/800x400?text=Luxury+Wear'">
                </div>
            </div>

            <h3 class="hero-title text-center text-gold text-lg mb-6 uppercase tracking-widest italic">The Collection</h3>
            <div id="vertical-cats" class="space-y-4"></div>

            <footer class="mt-20 border-t pt-10 text-center space-y-4 pb-10">
                <img src="images/logo.png" class="h-6 mx-auto opacity-50">
                <p class="text-[9px] uppercase tracking-[4px] opacity-40">Luxury Boutique © 2026</p>
            </footer>
        </section>

        <section id="list-page" class="page-view hidden p-4">
            <div class="flex items-center space-x-4 mb-8" onclick="showPage('home-page')">
                <i class="fas fa-arrow-left text-gold"></i>
                <h2 id="current-cat-name" class="hero-title text-xl uppercase tracking-tighter"></h2>
            </div>
            <div id="product-grid" class="grid gap-8"></div>
        </section>

        <section id="profile-page" class="page-view hidden p-6">
            <div id="auth-ui" class="max-w-md mx-auto space-y-6">
                <div class="text-center mb-10">
                    <h2 class="hero-title text-3xl">Welcome</h2>
                    <p class="text-[10px] uppercase opacity-40 mt-2">Sign in to your luxury account</p>
                </div>
                <button onclick="authAction('google')" class="w-full py-4 border rounded-2xl flex items-center justify-center space-x-3 text-sm font-semibold hover:bg-gray-50"><i class="fab fa-google text-red-500"></i> <span>Google Login</span></button>
                <button onclick="authAction('facebook')" class="w-full py-4 bg-[#1877F2] text-white rounded-2xl flex items-center justify-center space-x-3 text-sm font-semibold"><i class="fab fa-facebook-f"></i> <span>Facebook Login</span></button>
                
                <div class="relative py-4"><hr><span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white px-4 text-[10px] opacity-40 uppercase">OR</span></div>
                
                <input type="tel" id="mobileInput" placeholder="+91 Mobile Number" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none">
                <button onclick="authAction('mobile')" class="w-full py-4 bg-black text-white rounded-2xl text-[10px] font-bold uppercase tracking-widest">Send OTP</button>
            </div>
            
            <div id="user-dashboard" class="hidden text-center">
                <div class="bg-gray-50 p-10 rounded-[50px] border relative overflow-hidden mb-10">
                    <img id="profilePic" class="w-24 h-24 rounded-full mx-auto border-4 border-white shadow-xl mb-4">
                    <h3 id="profileName" class="font-bold text-lg"></h3>
                    <p id="profileEmail" class="text-xs opacity-40"></p>
                </div>
                <button onclick="firebase.auth().signOut()" class="text-red-500 font-bold text-xs uppercase underline">Logout</button>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t h-20 flex justify-around items-center z-[1000] px-6">
        <div onclick="showPage('home-page')" class="nav-btn active text-gold"><i class="fas fa-home text-lg"></i></div>
        <div onclick="showPage('orders-page')" class="nav-btn text-gray-300"><i class="fas fa-shopping-bag text-lg"></i></div>
        <div onclick="showPage('profile-page')" class="nav-btn text-gray-300"><i class="fas fa-user-circle text-lg"></i></div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
