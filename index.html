<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyra Collective | Luxury Modest Wear</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white">

    <div class="bg-black text-white py-2 text-[10px] tracking-[4px] text-center uppercase overflow-hidden whitespace-nowrap">
        <div class="animate-marquee inline-block">15% FOR YOUR FIRST ORDER | COD AVAILABLE ✅ ALL OVER INDIA</div>
    </div>

    <header class="sticky top-0 z-[1000] bg-white/80 backdrop-blur-md border-b border-[#D4AF37]/20 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-4">
            <i onclick="toggleSidebar(true)" class="fas fa-bars-staggered text-xl text-[#D4AF37] cursor-pointer"></i>
            <img src="images/logo.png" class="h-6" alt="Zyra Collective" onerror="this.src='https://via.placeholder.com/100x40?text=ZYRA'">
        </div>
        <div class="flex items-center space-x-5">
            <i class="fas fa-search text-sm opacity-50"></i>
            <div onclick="showSection('profile-page')" class="cursor-pointer">
                <i class="far fa-user-circle text-xl text-[#D4AF37]"></i>
            </div>
        </div>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-80 bg-white z-[3000] -translate-x-full transition-transform duration-700 p-8 shadow-2xl">
        <div class="flex justify-between items-center mb-16">
            <h2 class="hero-title text-[#D4AF37] text-2xl italic">Zyra Boutique</h2>
            <i onclick="toggleSidebar(false)" class="fas fa-times text-xl opacity-20 cursor-pointer"></i>
        </div>
        <nav class="space-y-8 uppercase text-[10px] font-bold tracking-[5px]">
            <p onclick="showSection('home-page')" class="hover:text-[#D4AF37] cursor-pointer">Home Collection</p>
            <p onclick="showPolicy('Privacy')" class="hover:text-[#D4AF37] cursor-pointer">Privacy Policy</p>
            <p onclick="showPolicy('Return')" class="hover:text-[#D4AF37] cursor-pointer">Return Policy</p>
            <p onclick="showPolicy('FAQ')" class="hover:text-[#D4AF37] cursor-pointer">FAQs</p>
        </nav>
    </aside>
    <div id="overlay" onclick="toggleSidebar(false)" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-[2500] hidden"></div>

    <main id="main-content" class="pb-28">
        
        <section id="home-page" class="view active p-4">
            <div class="relative h-64 rounded-[45px] overflow-hidden shadow-2xl mb-12 transform-gpu border border-[#D4AF37]/10">
                <div id="slider-track" class="flex transition-transform duration-[1.5s] ease-[cubic-bezier(0.23,1,0.32,1)] h-full" style="width: 400%;">
                    <img src="images/hero1.png" class="w-1/4 h-full object-cover">
                    <div class="w-1/4 h-full">
                        <video id="hero-vid" class="w-full h-full object-cover" muted loop playsinline>
                            <source src="images/video.mp4" type="video/mp4">
                        </video>
                    </div>
                    <img src="images/hero2.png" class="w-1/4 h-full object-cover">
                    <img src="images/hero3.png" class="w-1/4 h-full object-cover">
                </div>
            </div>

            <h3 class="hero-title text-center text-[#D4AF37] text-xl mb-8 uppercase tracking-[8px] italic">Categories</h3>
            <div id="category-list" class="space-y-6"></div>
        </section>

        <section id="list-page" class="view hidden p-5">
            <div class="flex items-center space-x-4 mb-10" onclick="showSection('home-page')">
                <i class="fas fa-arrow-left text-[#D4AF37]"></i>
                <h2 id="current-cat-name" class="hero-title text-2xl uppercase italic"></h2>
            </div>
            <div id="product-grid" class="grid gap-12"></div>
        </section>

        <section id="profile-page" class="view hidden p-8 text-center">
            <div id="auth-ui" class="space-y-6">
                <h2 class="hero-title text-3xl mb-12 italic">Luxury Access</h2>
                <button onclick="loginWithGoogle()" class="w-full py-5 border rounded-[30px] text-[10px] font-bold uppercase tracking-widest flex items-center justify-center space-x-4 transition active:scale-95">
                    <i class="fab fa-google text-red-500"></i> <span>Google Login</span>
                </button>
                <div class="py-4 opacity-20 text-[9px] tracking-[4px]">OR EMAIL SIGNUP</div>
                <input type="email" id="email" placeholder="Email" class="w-full p-5 bg-gray-50 rounded-[25px] border outline-none text-center">
                <button onclick="alert('OTP Sent')" class="w-full py-5 bg-black text-white rounded-[30px] text-[10px] font-bold uppercase tracking-widest">Send Verification</button>
            </div>
            <div id="user-ui" class="hidden animate-fade-in">
                <img id="user-img" class="w-24 h-24 rounded-full mx-auto mb-4 border-2 border-[#D4AF37]/20 shadow-xl">
                <h3 id="user-name" class="hero-title text-xl italic"></h3>
                <p id="user-email" class="text-[9px] opacity-40 uppercase tracking-widest mt-1"></p>
                <button onclick="firebase.auth().signOut()" class="mt-12 text-red-400 font-bold text-[10px] uppercase underline tracking-[3px]">Sign Out</button>
            </div>
        </section>
    </main>

    <div id="checkout-modal" class="fixed inset-0 bg-black/70 backdrop-blur-xl z-[5000] hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[50px] p-10 relative shadow-2xl border border-[#D4AF37]/10">
            <h2 class="hero-title text-2xl mb-8 italic">Complete Order</h2>
            <form action="https://formspree.io/f/mkovazzj" method="POST" class="space-y-5">
                <input type="hidden" name="Product" id="checkout-prod-name">
                <input type="text" name="Name" placeholder="Your Name" required class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-[#D4AF37]">
                <input type="text" name="Address" placeholder="Full Address" required class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-[#D4AF37]">
                
                <div class="flex space-x-4 pt-4">
                    <label class="flex-1 text-center p-4 border rounded-2xl cursor-pointer transition has-[:checked]:bg-[#D4AF37]/5 has-[:checked]:border-[#D4AF37]">
                        <input type="radio" name="Payment" value="COD" checked onclick="toggleQR(false)" class="hidden"> <span class="text-[10px] font-bold tracking-widest uppercase">COD</span>
                    </label>
                    <label class="flex-1 text-center p-4 border rounded-2xl cursor-pointer transition has-[:checked]:bg-[#D4AF37]/5 has-[:checked]:border-[#D4AF37]">
                        <input type="radio" name="Payment" value="UPI" onclick="toggleQR(true)" class="hidden"> <span class="text-[10px] font-bold tracking-widest uppercase">UPI</span>
                    </label>
                </div>

                <div id="upi-qr" class="hidden text-center py-6 bg-gray-50 rounded-3xl border border-dashed border-[#D4AF37]/40">
                    <p class="text-[8px] font-bold text-[#D4AF37] uppercase mb-3">Scan with any UPI App</p>
                    <img src="images/paymentqr.png" class="h-44 mx-auto rounded-xl shadow-lg" onerror="this.src='https://via.placeholder.com/200?text=Payment+QR'">
                </div>

                <button type="submit" class="w-full py-5 bg-black text-white rounded-[30px] text-[10px] font-bold uppercase tracking-widest shadow-xl">Place Order Now</button>
                <p onclick="document.getElementById('checkout-modal').classList.add('hidden')" class="text-center text-[9px] opacity-40 uppercase mt-4 cursor-pointer">Cancel</p>
            </form>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full h-24 bg-white/80 backdrop-blur-2xl border-t border-[#D4AF37]/10 flex justify-around items-center z-[2000] px-10">
        <div onclick="showSection('home-page')" class="nav-icon active"><i class="fas fa-home"></i></div>
        <div onclick="showSection('list-page')" class="nav-icon"><i class="fas fa-shopping-bag"></i></div>
        <div onclick="showSection('profile-page')" class="nav-icon"><i class="fas fa-user-circle"></i></div>
    </nav>

    <footer class="mt-20 border-t border-[#D4AF37]/10 bg-gray-50 p-10 text-center space-y-6">
        <img src="images/logo.png" class="h-6 mx-auto opacity-40">
        <div class="flex justify-center space-x-10 text-xl text-[#D4AF37]/60">
            <a href="https://www.instagram.com/um3rx70"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/917385009275"><i class="fab fa-whatsapp"></i></a>
        </div>
        <p class="text-[9px] uppercase tracking-[4px] opacity-30">© 2026 Zyra Collective. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
