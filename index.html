<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyra Collective | Luxury Modest Wear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white overflow-x-hidden">

    <header class="fixed top-0 w-full z-50 glass-effect p-4 flex justify-between items-center border-b border-gold/20">
        <img src="images/logo.png" alt="Zyra Logo" class="h-10">
        <button id="menu-btn" class="text-gold text-2xl"><i class="fas fa-bars"></i></button>
    </header>

    <section class="relative h-screen w-full overflow-hidden" id="hero">
        <div id="hero-container" class="h-full w-full flex transition-transform duration-700">
            </div>
    </section>

    <main class="p-6 space-y-12 mb-24">
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <nav class="fixed bottom-0 w-full glass-effect border-t border-gold/20 flex justify-around py-4 z-50">
        <button onclick="showSection('home')" class="text-gold flex flex-col items-center"><i class="fas fa-home"></i><span class="text-xs">Home</span></button>
        <button onclick="showSection('orders')" class="text-gray-400 flex flex-col items-center"><i class="fas fa-shopping-bag"></i><span class="text-xs">Orders</span></button>
        <button id="auth-btn" class="text-gray-400 flex flex-col items-center"><i class="fas fa-user"></i><span class="text-xs">Profile</span></button>
    </nav>

    <div id="modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-[60] flex items-center justify-center p-4">
        <div id="modal-content" class="bg-[#111] border border-gold/30 p-8 rounded-2xl w-full max-w-md relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gold"><i class="fas fa-times"></i></button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
