<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyra Collective | Luxury Modest Wear</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-black text-white py-2 text-[10px] tracking-[3px] text-center uppercase overflow-hidden whitespace-nowrap">
        <div class="animate-marquee">15% FOR YOUR FIRST ORDER | COD AVAILABLE ✅ ALL OVER INDIA</div>
    </div>

    <header class="sticky top-0 z-[1000] bg-white/90 backdrop-blur-md border-b border-gold/10 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-4">
            <i onclick="toggleSidebar(true)" class="fas fa-bars-staggered text-xl text-gold cursor-pointer"></i>
            <img src="images/logo.png" class="h-6" alt="Zyra" onerror="this.src='https://via.placeholder.com/80x30?text=ZYRA'">
        </div>
        <div class="flex items-center space-x-5">
            <i class="fas fa-search text-sm opacity-50"></i>
            <div id="auth-trigger" onclick="showSection('profile-page')" class="cursor-pointer">
                <i class="far fa-user-circle text-xl"></i>
            </div>
        </div>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-80 bg-white z-[3000] -translate-x-full transition-transform duration-700 p-8 shadow-2xl">
        <div class="flex justify-between items-center mb-16">
            <h2 class="hero-title text-gold text-2xl italic">Zyra Menu</h2>
            <i onclick="toggleSidebar(false)" class="fas fa-times text-xl opacity-20 cursor-pointer"></i>
        </div>
        <nav class="space-y-8 uppercase text-[10px] font-bold tracking-[4px]">
            <p onclick="showSection('home-page')" class="hover:text-gold cursor-pointer">Home Collection</p>
            <p onclick="showPolicy('Privacy')" class="hover:text-gold cursor-pointer">Privacy Policy</p>
            <p onclick="showPolicy('Return')" class="hover:text-gold cursor-pointer">Return Policy</p>
            <p onclick="showPolicy('FAQ')" class="hover:text-gold cursor-pointer">FAQs</p>
        </nav>
    </aside>
    <div id="overlay" onclick="toggleSidebar(false)" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-[2500] hidden"></div>

    <main id="app-content">
        <section id="home-page" class="view active p-4">
            <div class="relative h-64 rounded-[40px] overflow-hidden shadow-2xl mb-12 transform-gpu">
                <div id="slider-track" class="flex transition-transform duration-[1.5s] ease-[cubic-bezier(0.23,1,0.32,1)] h-full" style="width: 400%;">
                    <img src="images/hero1.png" class="w-1/4 object-cover">
                    <div class="w-1/4 h-full">
                        <video id="hero-vid" class="w-full h-full object-cover" muted loop playsinline>
                            <source src="images/video.mp4" type="video/mp4">
                        </video>
                    </div>
                    <img src="images/hero2.png" class="w-1/4 object-cover">
                    <img src="images/hero3.png" class="w-1/4 object-cover">
                </div>
            </div>

            <h3 class="hero-title text-center text-gold text-xl mb-8 uppercase tracking-[6px] italic">Boutique Categories</h3>
            <div id="cat-grid" class="space-y-6"></div>
        </section>

        <section id="list-page" class="view hidden p-5">
            <div class="flex items-center space-x-4 mb-10" onclick="showSection('home-page')">
                <i class="fas fa-arrow-left text-gold"></i>
                <h2 id="cat-title" class="hero-title text-2xl uppercase italic"></h2>
            </div>
            <div id="prod-grid" class="grid gap-12"></div>
        </section>

        <section id="profile-page" class="view hidden p-8 text-center">
            <div id="auth-ui" class="space-y-6">
                <h2 class="hero-title text-3xl mb-12">Luxury Access</h2>
                <button onclick="login('google')" class="w-full py-5 border rounded-3xl text-[10px] font-bold uppercase tracking-widest flex items-center justify-center space-x-4"><i class="fab fa-google text-red-500"></i> <span>Google Login</span></button>
                <input type="tel" id="mobile" placeholder="Phone with +91" class="w-full p-5 bg-gray-50 rounded-3xl border outline-none text-center">
                <button onclick="login('otp')" class="w-full py-5 bg-black text-white rounded-3xl text-[10px] font-bold uppercase tracking-widest">Verify Mobile</button>
            </div>
            <div id="user-ui" class="hidden">
                <div class="bg-white p-10 rounded-[50px] border border-gold/10 shadow-lg">
                    <img id="u-img" class="w-24 h-24 rounded-full mx-auto mb-4 border-2 border-gold/20">
                    <h3 id="u-name" class="hero-title text-xl"></h3>
                    <p id="u-mail" class="text-[10px] opacity-40 uppercase"></p>
                </div>
                <button onclick="firebase.auth().signOut()" class="mt-10 text-red-400 text-[10px] font-bold underline uppercase">Sign Out</button>
            </div>
        </section>
    </main>

    <div id="checkout-modal" class="fixed inset-0 bg-black/60 backdrop-blur-xl z-[5000] hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[50px] p-8 relative animate-scale-up">
            <h2 class="hero-title text-2xl mb-6">Checkout</h2>
            <form id="order-form" action="https://formspree.io/f/mkovazzj" method="POST" class="space-y-4">
                <input type="hidden" name="Product" id="form-prod-name">
                <input type="text" name="Name" placeholder="Full Name" required class="w-full p-4 border rounded-2xl outline-none">
                <input type="text" name="Address" placeholder="Full Address" required class="w-full p-4 border rounded-2xl outline-none">
                <div class="flex space-x-4 py-4">
                    <label class="flex-1 text-center p-4 border rounded-2xl cursor-pointer has-[:checked]:border-gold has-[:checked]:bg-gold/5">
                        <input type="radio" name="Payment" value="COD" checked onclick="toggleQR(false)" class="hidden"> <span class="text-[10px] font-bold uppercase">COD</span>
                    </label>
                    <label class="flex-1 text-center p-4 border rounded-2xl cursor-pointer has-[:checked]:border-gold has-[:checked]:bg-gold/5">
                        <input type="radio" name="Payment" value="UPI" onclick="toggleQR(true)" class="hidden"> <span class="text-[10px] font-bold uppercase">UPI</span>
                    </label>
                </div>
                <div id="qr-display" class="hidden text-center py-4 bg-gray-50 rounded-3xl border border-dashed border-gold/30">
                    <p class="text-[8px] font-bold text-gold uppercase mb-2">Scan & Pay via UPI</p>
                    <img src="images/paymentqr.png" class="h-40 mx-auto" onerror="this.src='https://via.placeholder.com/200?text=Payment+QR'">
                </div>
                <button type="submit" class="w-full py-5 bg-black text-white rounded-3xl text-[10px] font-bold uppercase tracking-widest">Complete Order</button>
                <p onclick="document.getElementById('checkout-modal').classList.add('hidden')" class="text-center text-[9px] uppercase opacity-40 mt-4 cursor-pointer">Cancel</p>
            </form>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full h-20 bg-white/80 backdrop-blur-2xl border-t flex justify-around items-center z-[2000]">
        <div onclick="showSection('home-page')" class="text-gold"><i class="fas fa-home text-lg"></i></div>
        <div onclick="showSection('list-page')" class="text-gray-300"><i class="fas fa-shopping-bag text-lg"></i></div>
        <div onclick="showSection('profile-page')" class="text-gray-300"><i class="fas fa-user-circle text-lg"></i></div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
